services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bespoke_vows
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bespoke_vows"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
